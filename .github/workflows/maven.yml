# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

# trigger - When your pipeline will be executed.
on:     # on which event it will start
  push:       # pushed changes to main branch repository pipeline triggers. done in lower environments , productions manual.
    branches: [ "main" ] 
# trigger end

env:  # Golbal environment variable
  APP_NAME: Cloudtechs-Club-Java-Demo 

jobs:   # jobs assumes as stages.
  Pre-build:
    name: Prebuild Phase
    runs-on: ubuntu-latest  # to where you want to execute the job. "ubuntu-latest" this is free runner. No access to this machine.
    env:    # Local environment variable
      STAGE_NAME: Cloudtechs-Club-Java-Demo 
    
    steps:  
    - uses: actions/checkout@v4 # its going to clone the repo on ubuntu latest.
    - name: Set up JDK 17   # name for setup given here
      uses: actions/setup-java@v4  # install java
      with: 
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: |
          mvn -B compile --file pom.xml
          mvn -B test --file pom.xml 
          echo "App Name: $APP_NAME"
          echo "Stage-Name: $STAGE_NAME"

  build:
    name: Builing Package
    runs-on: ubuntu-latest  # to where you want to execute the job. "ubuntu-latest" this is free runner. No access to this machine.
    needs: Pre-build
    steps:  
    - uses: actions/checkout@v4 # its going to clone the repo on ubuntu latest.
    - name: Set up JDK 17   # name for setup given here
      uses: actions/setup-java@v4  # install java
      with: 
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: |
        echo "App Name: $APP_NAME"
        mvn -B package --file pom.xml   

    - uses: actions/upload-artifact@v4
      with:
         name: boardgame
         path: target/*jar # in Java project artifacts are created in target folder
