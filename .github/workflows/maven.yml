# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

# trigger - When your pipeline will be executed.
on:     # on which event it will start
  push:       # pushed changes to main branch repository pipeline triggers. done in lower environments , productions manual.
    branches: [ "main" ] 
  pull_request:    # pull request raised triggres the pipeline. Not recommended. 
    branches: [ "main" ]
# trigger end

jobs:   # jobs assumes as stages.
  build:

    runs-on: ubuntu-latest  # to where you want to execute the job. "ubuntu-latest" this is free runner. No access to this machine.

    steps:  
    - uses: actions/checkout@v4 # its going to clone the repo on ubuntu latest.
    - name: Set up JDK 17   # name for setup given here
      uses: actions/setup-java@v4  # install java
      with: 
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml   # maven -B to run background mode , non interactive , package to genrate jar file. 

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
